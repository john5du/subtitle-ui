name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional release version (accepts 0.2.2 or v0.2.2)
        required: false
        type: string

permissions:
  contents: write

jobs:
  create-tag:
    runs-on: ubuntu-latest
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      REQUESTED_VERSION: ${{ github.event.inputs.version }}
      HAS_TAG_PUSH_TOKEN: ${{ secrets.TAG_PUSH_TOKEN != '' }}
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Sync latest default branch commit
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin "${DEFAULT_BRANCH}" --tags --force
          git checkout -B "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"

          echo "Default branch: ${DEFAULT_BRANCH}"
          echo "Target commit: $(git rev-parse HEAD)"

      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          import json
          import os
          import re
          import sys

          def fail(message):
              print(message, file=sys.stderr)
              sys.exit(1)

          def parse_semver(value, label):
              match = re.fullmatch(r"v?(\d+)\.(\d+)\.(\d+)", value.strip())
              if not match:
                  fail(f"Invalid {label}: '{value}'. Expected x.y.z or vx.y.z.")

              parts = tuple(int(part) for part in match.groups())
              normalized = ".".join(str(part) for part in parts)
              return parts, normalized

          backend_text = open(
              "backend/internal/version/version.go",
              encoding="utf-8",
          ).read()
          backend_match = re.search(r'^const Value = "([^"]+)"$', backend_text, re.MULTILINE)
          if not backend_match:
              fail("Failed to read backend version from backend/internal/version/version.go.")

          backend_parts, backend_version = parse_semver(
              backend_match.group(1),
              "backend version",
          )

          with open("frontend/package.json", encoding="utf-8") as package_file:
              frontend_version_value = str(json.load(package_file).get("version", "")).strip()

          frontend_parts, frontend_version = parse_semver(
              frontend_version_value,
              "frontend version",
          )

          if backend_parts != frontend_parts:
              fail(
                  "Version mismatch between backend/internal/version/version.go "
                  f"({backend_version}) and frontend/package.json ({frontend_version})."
              )

          requested_version = os.environ.get("REQUESTED_VERSION", "").strip()
          if requested_version:
              _, normalized_version = parse_semver(requested_version, "version input")
          else:
              major, minor, patch = backend_parts
              normalized_version = f"{major}.{minor}.{patch + 1}"

          tag_name = f"v{normalized_version}"

          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as output:
              output.write(f"current_version={backend_version}\n")
              output.write(f"normalized_version={normalized_version}\n")
              output.write(f"tag_name={tag_name}\n")

          print(f"Current version: {backend_version}")
          print(f"Release tag: {tag_name}")
          PY

      - name: Verify tag does not already exist
        shell: bash
        env:
          TAG_NAME: ${{ steps.resolve.outputs.tag_name }}
        run: |
          set -euo pipefail

          if git ls-remote --refs --exit-code --tags origin "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists on origin." >&2
            exit 1
          fi

          if git show-ref --tags --verify --quiet "refs/tags/${TAG_NAME}"; then
            echo "Tag ${TAG_NAME} already exists locally." >&2
            exit 1
          fi

      - name: Warn when using default GITHUB_TOKEN
        if: env.HAS_TAG_PUSH_TOKEN != 'true'
        shell: bash
        run: |
          echo "::warning::TAG_PUSH_TOKEN is not configured. The tag push will still work, but GitHub does not trigger push-based workflows from GITHUB_TOKEN pushes. Configure TAG_PUSH_TOKEN if you want docker-publish.yml to run automatically after tagging."

      - name: Create and push lightweight tag
        shell: bash
        env:
          TAG_NAME: ${{ steps.resolve.outputs.tag_name }}
          PUSH_TOKEN: ${{ secrets.TAG_PUSH_TOKEN != '' && secrets.TAG_PUSH_TOKEN || github.token }}
        run: |
          set -euo pipefail

          git tag "${TAG_NAME}"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "refs/tags/${TAG_NAME}"

          echo "Pushed ${TAG_NAME}"
