name: Sync Version Files

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Derive version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Syncing version to $VERSION"

      - name: Update version files
        run: |
          node -e "const fs=require('fs'); const version=process.env.VERSION; const pkgPath='frontend/package.json'; const lockPath='frontend/package-lock.json'; const pkg=JSON.parse(fs.readFileSync(pkgPath,'utf8')); pkg.version=version; fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n'); const lock=JSON.parse(fs.readFileSync(lockPath,'utf8')); lock.version=version; if (lock.packages && lock.packages['']) { lock.packages[''].version=version; } fs.writeFileSync(lockPath, JSON.stringify(lock, null, 2) + '\n');"
          sed -i -E "s/const Value = \".*\"/const Value = \"${VERSION}\"/" backend/internal/version/version.go
          sed -i -E "s/^Current Release Version: .*/Current Release Version: ${VERSION}/" README.md
          sed -i -E "s/^Current Release Version: .*/Current Release Version: ${VERSION}/" README.zh-CN.md

      - name: Commit and push
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/package.json frontend/package-lock.json backend/internal/version/version.go README.md README.zh-CN.md
          git commit -m "chore: sync version to ${VERSION} [skip ci]"
          git push origin "HEAD:${DEFAULT_BRANCH}"
