<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Subtitle UI favicon">
  <defs>
    <linearGradient id="bg" x1="8%" y1="4%" x2="92%" y2="96%">
      <stop offset="0%" stop-color="#31486a"/>
      <stop offset="52%" stop-color="#162743"/>
      <stop offset="100%" stop-color="#091222"/>
    </linearGradient>
    <radialGradient id="shine" cx="22%" cy="14%" r="74%">
      <stop offset="0%" stop-color="#8fc4ff" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#8fc4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="caption" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#45e7ff"/>
      <stop offset="100%" stop-color="#14b8ff"/>
    </linearGradient>
    <linearGradient id="play" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dcecff"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#040914" flood-opacity="0.28"/>
    </filter>
    <filter id="playShadow" x="-30%" y="-30%" width="170%" height="170%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#08101d" flood-opacity="0.34"/>
    </filter>
  </defs>

  <g filter="url(#cardShadow)">
    <rect x="34" y="34" width="444" height="444" rx="112" fill="url(#bg)"/>
    <rect x="34" y="34" width="444" height="444" rx="112" fill="url(#shine)"/>
    <rect x="34" y="34" width="444" height="444" rx="112" fill="none" stroke="#89a7cc" stroke-opacity="0.26" stroke-width="6"/>
  </g>

  <path
    d="M175 133 L175 317 Q175 332 188 325 L337 241 Q351 233 351 225 Q351 217 337 209 L188 125 Q175 118 175 133 Z"
    fill="url(#play)"
    filter="url(#playShadow)"
  />

  <rect x="103" y="348" width="306" height="82" rx="41" fill="url(#caption)"/>
