<svg xmlns="http://www.w3.org/2000/svg" width="768" height="768" viewBox="0 0 768 768" role="img" aria-label="Subtitle UI icon">
  <defs>
    <linearGradient id="cardTopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2e3957"/>
      <stop offset="100%" stop-color="#232f4c"/>
    </linearGradient>

    <linearGradient id="cardBottomGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#121a30"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <linearGradient id="cardStrokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7f8eb3" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6b7fa8" stop-opacity="0.25"/>
    </linearGradient>

    <filter id="cardShadow" x="-24%" y="-24%" width="148%" height="165%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0d1222" flood-opacity="0.58"/>
      <feDropShadow dx="0" dy="42" stdDeviation="34" flood-color="#0a0f1d" flood-opacity="0.44"/>
    </filter>

    <filter id="glow" x="-35%" y="-180%" width="170%" height="460%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.17 0 0 0 0 0.98 0 0 0 0 1 0 0 0 1 0"/>
    </filter>

    <filter id="playShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#0b1020" flood-opacity="0.45"/>
    </filter>

    <clipPath id="cardClip">
      <rect x="134" y="132" width="500" height="500" rx="120"/>
    </clipPath>
  </defs>

  <g filter="url(#cardShadow)">
    <g clip-path="url(#cardClip)">
      <rect x="134" y="132" width="500" height="500" rx="120" fill="url(#cardTopGrad)"/>
      <rect x="134" y="518" width="500" height="114" fill="url(#cardBottomGrad)"/>
      <line x1="134" y1="518" x2="634" y2="518" stroke="#7385ad" stroke-opacity="0.42" stroke-width="2"/>
      <ellipse cx="384" cy="176" rx="190" ry="52" fill="#5f7198" fill-opacity="0.08"/>
    </g>
    <rect x="134" y="132" width="500" height="500" rx="120" fill="none" stroke="url(#cardStrokeGrad)" stroke-width="3"/>
  </g>

  <g filter="url(#playShadow)">
    <path d="M206 200 L206 242 Q206 248 211 245 L246 223 Q250 220 246 217 L211 195 Q206 192 206 200 Z" fill="#eef4ff"/>
  </g>

  <g>
    <line x1="216" y1="556" x2="552" y2="556" stroke="#2de7ff" stroke-width="20" stroke-linecap="round" filter="url(#glow)"/>
    <line x1="216" y1="590" x2="552" y2="590" stroke="#2de7ff" stroke-width="20" stroke-linecap="round" filter="url(#glow)"/>

    <line x1="216" y1="556" x2="552" y2="556" stroke="#35dcf2" stroke-width="18" stroke-linecap="round"/>
    <line x1="216" y1="590" x2="552" y2="590" stroke="#35dcf2" stroke-width="18" stroke-linecap="round"/>
  </g>
</svg>
