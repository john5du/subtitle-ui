      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#04101a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g filter="url(#cardShadow)">
    <rect x="34" y="34" width="444" height="444" rx="112" fill="url(#bg)"/>
    <rect x="34" y="34" width="444" height="444" rx="112" fill="url(#shine)"/>
    <path d="M63 84 C126 54 218 54 292 86" fill="none" stroke="#b6cfff" stroke-opacity="0.11" stroke-width="18" stroke-linecap="round"/>
    <rect x="34" y="34" width="444" height="444" rx="112" fill="none" stroke="#8ea9ce" stroke-opacity="0.28" stroke-width="6"/>
  </g>

  <path
    d="M172 132 L172 318 Q172 334 186 326 L339 240 Q353 232 353 224 Q353 216 339 208 L186 122 Q172 114 172 132 Z"
    fill="url(#play)"
    filter="url(#playShadow)"
  />

  <g filter="url(#captionShadow)">
