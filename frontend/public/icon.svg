<svg xmlns="http://www.w3.org/2000/svg" width="768" height="768" viewBox="0 0 512 512" role="img" aria-label="Subtitle UI icon">
  <defs>
    <linearGradient id="bg" x1="8%" y1="4%" x2="92%" y2="96%">
      <stop offset="0%" stop-color="#334b71"/>
      <stop offset="52%" stop-color="#182b49"/>
      <stop offset="100%" stop-color="#0a1324"/>
    </linearGradient>
    <radialGradient id="shine" cx="22%" cy="14%" r="74%">
      <stop offset="0%" stop-color="#9bcbff" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#9bcbff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="caption" x1="0%" y1="0%" x2="100%" y2="0%">
